name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
  CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
  CLOUD_SQL_CONNECTION_NAME: ${{ vars.CLOUD_SQL_CONNECTION_NAME }}
  NEXT_PUBLIC_ADSENSE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
  IMAGE_NAME: oto-atsume

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies for Prisma
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/otoatsume?schema=public
        run: pnpm prisma:generate

      - name: Typecheck
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/otoatsume?schema=public
        run: pnpm typecheck

      - name: Set image URI
        run: |
          echo "IMAGE_URI=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg "NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID}" \
            --tag "${IMAGE_URI}" \
            --push \
            .

      - name: Download Cloud SQL Auth Proxy
        run: |
          curl -fsSL -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud-sql-proxy "${CLOUD_SQL_CONNECTION_NAME}" --port 5432 --quiet &
          echo $! > cloud-sql-proxy.pid
          sleep 5

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: pnpm prisma:deploy

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --image "${IMAGE_URI}" \
            --port 8080 \
            --allow-unauthenticated \
            --service-account "${CLOUD_RUN_SERVICE_ACCOUNT}" \
            --add-cloudsql-instances "${CLOUD_SQL_CONNECTION_NAME}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,NEXT_PUBLIC_SITE_URL=NEXT_PUBLIC_SITE_URL:latest,NEXTAUTH_URL=NEXTAUTH_URL:latest,ADMIN_ALLOWED_EMAILS=ADMIN_ALLOWED_EMAILS:latest,AUTH_SECRET=AUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,CAPTCHA_SECRET_KEY=CAPTCHA_SECRET_KEY:latest,NEXT_PUBLIC_CAPTCHA_SITE_KEY=NEXT_PUBLIC_CAPTCHA_SITE_KEY:latest,YOUTUBE_DATA_API_KEY=YOUTUBE_DATA_API_KEY:latest" \
            --set-env-vars "NEXT_PUBLIC_ADSENSE_CLIENT_ID=${NEXT_PUBLIC_ADSENSE_CLIENT_ID}" \
            --quiet

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: |
          if [ -f cloud-sql-proxy.pid ]; then
            kill "$(cat cloud-sql-proxy.pid)" || true
          fi
