services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: utaatsume
      POSTGRES_PASSWORD: password
      POSTGRES_DB: utaatsume
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utaatsume -d utaatsume"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
